<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>AutoKanban — Concessionária</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#060c16;font-family:'Segoe UI',system-ui,sans-serif;color:#f1f5f9;}
input,select,textarea,button{font-family:inherit;}
::-webkit-scrollbar{width:6px;height:6px;}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.1);border-radius:3px;}
.card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.07);border-radius:9px;padding:13px;cursor:pointer;transition:all 0.18s;margin-bottom:7px;}
.card:hover{background:rgba(255,255,255,0.06);transform:translateY(-2px);}
.input{width:100%;box-sizing:border-box;background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:8px;color:#f1f5f9;font-size:13px;padding:9px 12px;outline:none;}
.btn{padding:9px 16px;border-radius:9px;font-size:13px;cursor:pointer;border:none;font-family:inherit;transition:all 0.2s;}
.label{display:block;font-size:10px;letter-spacing:1.5px;color:#64748b;text-transform:uppercase;margin-bottom:5px;}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.75);backdrop-filter:blur(8px);display:flex;align-items:center;justify-content:center;z-index:1000;padding:16px;}
.modal{background:#0c1220;border:1px solid rgba(255,255,255,0.1);border-radius:16px;width:100%;max-width:560px;max-height:90vh;overflow-y:auto;padding:28px;box-shadow:0 30px 70px rgba(0,0,0,0.7);}
.col-header{display:flex;align-items:center;justify-content:space-between;padding:9px 13px;background:rgba(255,255,255,0.025);border:1px solid rgba(255,255,255,0.07);border-bottom:none;border-radius:9px 9px 0 0;}
.col-body{background:rgba(255,255,255,0.015);border:1px solid rgba(255,255,255,0.07);border-top:none;border-radius:0 0 9px 9px;padding:9px;min-height:100px;}
.empty{display:flex;align-items:center;justify-content:center;min-height:70px;color:#1e293b;font-size:11px;letter-spacing:1px;border:1px dashed rgba(255,255,255,0.04);border-radius:7px;}
.tab-btn{background:transparent;border:1px solid transparent;color:#475569;border-radius:8px;padding:5px 13px;cursor:pointer;font-size:12px;display:flex;align-items:center;gap:5px;font-family:inherit;}
.tab-btn.active{background:linear-gradient(135deg,rgba(99,102,241,0.25),rgba(139,92,246,0.25));border-color:rgba(139,92,246,0.45);color:#c4b5fd;font-weight:700;}
.chip{font-size:9px;font-weight:700;color:#94a3b8;background:rgba(148,163,184,0.1);border:1px solid rgba(148,163,184,0.2);border-radius:4px;padding:2px 7px;white-space:nowrap;max-width:110px;overflow:hidden;text-overflow:ellipsis;display:inline-block;}
.move-btn{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.08);color:#64748b;border-radius:4px;width:22px;height:22px;cursor:pointer;font-size:10px;font-family:inherit;}
.check-label{display:flex;align-items:center;gap:7px;cursor:pointer;padding:5px 9px;border-radius:6px;transition:all 0.2s;margin-bottom:4px;}
.sugestao{background:rgba(16,185,129,0.07);border:1px solid rgba(16,185,129,0.15);color:#475569;border-radius:20px;font-size:10px;padding:3px 10px;cursor:pointer;font-family:inherit;}
.sugestao:hover{color:#6ee7b7;border-color:rgba(16,185,129,0.35);}
.example{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#475569;border-radius:20px;font-size:10px;padding:3px 10px;cursor:pointer;font-family:inherit;}
.example:hover{color:#94a3b8;}
</style>
</head>
<body>
<div id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-app.js";
import { getDatabase, ref, onValue, set } from "https://www.gstatic.com/firebasejs/10.7.0/firebase-database.js";

const FIREBASE = {
  apiKey: "AIzaSyC5iP4vJ9YF2QSPSE5Vi04TVU5Nh5A8oKA",
  authDomain: "manutencao-f00be.firebaseapp.com",
  databaseURL: "https://manutencao-f00be-default-rtdb.firebaseio.com",
  projectId: "manutencao-f00be",
  storageBucket: "manutencao-f00be.firebasestorage.app",
  messagingSenderId: "218382116890",
  appId: "1:218382116890:web:084402591f320e690809a3"
};
const GEMINI_KEY = "AIzaSyD-G0mcFLMc0tB_Tm7YeyxcI6JOkTZad7E";
const GEMINI_URL = "https://generativelanguage.googleapis.com/v1beta/models/gemini-pro:generateContent?key=" + GEMINI_KEY;

const app = initializeApp(FIREBASE);
const db = getDatabase(app);

const BOARDS = {
  manutencao: {
    label: "Manutenção", icon: "🔧",
    cols: [
      {id:"recepcao",label:"Recepção",color:"#38bdf8"},
      {id:"revisao",label:"Revisão",color:"#a78bfa"},
      {id:"pintura",label:"Pintura",color:"#fbbf24"},
      {id:"outros",label:"Outros",color:"#34d399"},
      {id:"higienizacao",label:"Higienização",color:"#f472b6"},
      {id:"finalizado",label:"Finalizado",color:"#4ade80"}
    ]
  },
  posVenda: {
    label: "Pós-venda / Garantia", icon: "🛡️",
    cols: [
      {id:"recepcao_os",label:"Recepção/OS",color:"#38bdf8"},
      {id:"diagnostico",label:"Diagnóstico",color:"#c084fc"},
      {id:"manutencao_reparo",label:"Manutenção/Reparo",color:"#fbbf24"},
      {id:"aguardando_peca",label:"Aguardando Peça",color:"#fb923c"},
      {id:"pronto",label:"Pronto",color:"#4ade80"}
    ]
  }
};

const CHECKLISTS = {
  manutencao:[
    {cat:"Motor",items:["Troca de óleo","Filtro de óleo","Filtro de ar","Velas","Correia dentada"]},
    {cat:"Freios",items:["Pastilhas dianteiras","Pastilhas traseiras","Discos","Fluido de freio"]},
    {cat:"Elétrica",items:["Bateria","Alternador","Luzes","Sensor lambda"]},
    {cat:"Suspensão",items:["Amortecedores","Molas","Buchas","Alinhamento","Balanceamento"]}
  ],
  posVenda:[
    {cat:"Diagnóstico",items:["Leitura de falhas","Teste de pressão","Inspeção visual","Teste de estrada"]},
    {cat:"Garantia",items:["Documento de garantia","NF das peças","Aprovação fábrica","Fotos registradas"]},
    {cat:"Reparo",items:["Peças solicitadas","Peças recebidas","Mão de obra executada","Teste final"]},
    {cat:"Entrega",items:["Lavagem","Verificação retrovisor","Documentação cliente","Assinatura OS"]}
  ]
};

const uid = () => Math.random().toString(36).slice(2) + Date.now().toString(36);

function newChecklist(boardId) {
  return (CHECKLISTS[boardId]||[]).map(function(c) {
    return { cat: c.cat, items: c.items.map(function(l){ return {id:uid(),label:l,done:false}; }) };
  });
}

function progress(checklist) {
  var all = []; checklist.forEach(function(c){ c.items.forEach(function(i){ all.push(i); }); });
  if(!all.length) return 0;
  return Math.round(all.filter(function(i){ return i.done; }).length / all.length * 100);
}

function defaultData() {
  return {
    manutencao:{recepcao:[],revisao:[],pintura:[],outros:[],higienizacao:[],finalizado:[]},
    posVenda:{recepcao_os:[],diagnostico:[],manutencao_reparo:[],aguardando_peca:[],pronto:[]}
  };
}

// STATE
var S = {
  data: null,
  board: "manutencao",
  editCard: null,
  editColId: null,
  showNew: false,
  syncStatus: "ok",
  lastSync: null,
  queryResult: null,
  queryLoading: false,
  cmdResult: null,
  cmdLoading: false,
  aiLog: []
};

function setState(patch) {
  Object.assign(S, patch);
  render();
}

// FIREBASE
onValue(ref(db, "autokanban/dados"), function(snap) {
  var val = snap.val();
  setState({ data: val || defaultData(), lastSync: new Date(), syncStatus: "ok" });
});

function save(d) {
  setState({syncStatus:"saving"});
  set(ref(db, "autokanban/dados"), d).then(function(){
    setState({syncStatus:"ok", lastSync:new Date()});
  }).catch(function(){ setState({syncStatus:"error"}); });
}

function update(fn) {
  var next = JSON.parse(JSON.stringify(S.data));
  fn(next);
  setState({data:next});
  save(next);
}

// GEMINI
async function callGemini(prompt) {
  var r = await fetch(GEMINI_URL, {
    method: "POST",
    headers: {"Content-Type":"application/json"},
    body: JSON.stringify({
      contents:[{role:"user",parts:[{text:prompt}]}],
      generationConfig:{temperature:0.1,maxOutputTokens:1500}
    })
  });
  var d = await r.json();
  if(d.error) throw new Error(d.error.message);
  return d.candidates[0].content.parts[0].text;
}

async function interpretCmd(text) {
  var allCards = [];
  Object.keys(S.data).forEach(function(bId){
    (BOARDS[bId]||{cols:[]}).cols.forEach(function(col){
      (S.data[bId][col.id]||[]).forEach(function(card){
        allCards.push({board:BOARDS[bId].label,etapa:col.label,placa:card.placa,modelo:card.modelo,prioridade:card.prioridade,oficina:card.oficina||"",consultor:card.consultor||""});
      });
    });
  });

  var prompt = "Você é assistente do AutoKanban de uma concessionária. Retorne APENAS JSON válido sem markdown.\n\n"
    + "BOARDS: manutencao(recepcao,revisao,pintura,outros,higienizacao,finalizado) | posVenda(recepcao_os,diagnostico,manutencao_reparo,aguardando_peca,pronto)\n\n"
    + "AÇÕES:\n"
    + "adicionar: {\"acao\":\"adicionar\",\"board\":\"manutencao\",\"coluna\":\"recepcao\",\"placa\":\"ABC-1234\",\"modelo\":\"...\",\"prioridade\":\"media\",\"observacoes\":\"...\",\"consultor\":\"...\",\"oficina\":\"...\"}\n"
    + "mover: {\"acao\":\"mover\",\"placa\":\"ABC-1234\",\"coluna_destino\":\"revisao\",\"board\":\"manutencao\"}\n"
    + "atualizar: {\"acao\":\"atualizar\",\"placa\":\"ABC-1234\",\"campos\":{\"observacoes\":\"...\",\"oficina\":\"...\"}}\n"
    + "remover: {\"acao\":\"remover\",\"placa\":\"ABC-1234\"}\n\n"
    + "REGRAS: Placas em maiúsculas com hífen. Retorne {\"acoes\":[...],\"resumo\":\"...\"}\n\n"
    + "ESTADO ATUAL: " + JSON.stringify(allCards) + "\n\n"
    + "COMANDO: " + text;

  var raw = await callGemini(prompt);
  var clean = raw.replace(/```json/g,"").replace(/```/g,"").trim();
  return JSON.parse(clean);
}

async function consultaIA(pergunta) {
  var cards = [];
  Object.keys(S.data).forEach(function(bId){
    (BOARDS[bId]||{cols:[]}).cols.forEach(function(col){
      (S.data[bId][col.id]||[]).forEach(function(card){
        var pend = [];
        card.checklist.forEach(function(c){ c.items.forEach(function(i){ if(!i.done) pend.push(i.label); }); });
        cards.push({board:BOARDS[bId].label,etapa:col.label,placa:card.placa,modelo:card.modelo,prioridade:card.prioridade,oficina:card.oficina||"—",consultor:card.consultor||"—",progresso:progress(card.checklist)+"%",pendentes:pend});
      });
    });
  });

  var prompt = "Você é assistente de consulta do AutoKanban de uma concessionária.\n"
    + "Responda em português com emojis de forma clara e objetiva.\n\n"
    + "DADOS (" + cards.length + " veículos):\n" + JSON.stringify(cards, null, 2) + "\n\n"
    + "PERGUNTA: " + pergunta;

  return await callGemini(prompt);
}

function applyActions(acoes) {
  update(function(d){
    acoes.forEach(function(a){
      if(a.acao === "adicionar") {
        var board = a.board||"manutencao";
        var col = a.coluna||"recepcao";
        if(!d[board][col]) d[board][col]=[];
        d[board][col].unshift({
          id:uid(), placa:(a.placa||"SEM-PLACA").toUpperCase(),
          modelo:a.modelo||"Veículo", prioridade:a.prioridade||"media",
          observacoes:a.observacoes||"", consultor:a.consultor||"",
          oficina:a.oficina||"", checklist:newChecklist(board),
          criadoEm:new Date().toISOString()
        });
      }
      if(a.acao === "mover") {
        var placa = (a.placa||"").toUpperCase();
        var board = a.board||"manutencao";
        var found = null;
        Object.keys(d[board]).forEach(function(col){
          var idx = d[board][col].findIndex(function(c){ return c.placa===placa; });
          if(idx !== -1 && !found) { found = d[board][col].splice(idx,1)[0]; }
        });
        if(found && a.coluna_destino) {
          if(!d[board][a.coluna_destino]) d[board][a.coluna_destino]=[];
          d[board][a.coluna_destino].unshift(found);
        }
      }
      if(a.acao === "atualizar") {
        var placa = (a.placa||"").toUpperCase();
        Object.keys(d).forEach(function(b){ Object.keys(d[b]).forEach(function(col){
          var card = d[b][col].find(function(c){ return c.placa===placa; });
          if(card) Object.assign(card, a.campos||{});
        });});
      }
      if(a.acao === "remover") {
        var placa = (a.placa||"").toUpperCase();
        Object.keys(d).forEach(function(b){ Object.keys(d[b]).forEach(function(col){
          d[b][col] = d[b][col].filter(function(c){ return c.placa!==placa; });
        });});
      }
    });
  });
}

// RENDER
function render() {
  document.getElementById("app").innerHTML = S.data ? renderApp() : renderLoading();
  attachEvents();
}

function renderLoading() {
  return '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;"><div style="text-align:center"><div style="font-size:44px;margin-bottom:14px">🔧</div><div style="font-size:12px;letter-spacing:3px;color:#334155">CARREGANDO...</div></div></div>';
}

function renderApp() {
  var board = BOARDS[S.board];
  var bdata = S.data[S.board];
  var total = 0; Object.values(bdata).forEach(function(c){ total+=c.length; });
  var doneKey = S.board==="manutencao"?"finalizado":"pronto";
  var done = (bdata[doneKey]||[]).length;
  var syncColor = S.syncStatus==="saving"?"#fbbf24":S.syncStatus==="error"?"#f87171":"#4ade80";
  var syncLabel = S.syncStatus==="saving"?"⟳ SYNC":S.syncStatus==="error"?"⚠ ERRO":"● AO VIVO";

  var html = '';

  // HEADER
  html += '<div style="background:rgba(6,12,22,0.97);border-bottom:1px solid rgba(255,255,255,0.06);padding:0 20px;position:sticky;top:0;z-index:100;backdrop-filter:blur(20px);">';
  html += '<div style="max-width:1700px;margin:0 auto;display:flex;align-items:center;gap:16px;height:56px;flex-wrap:wrap;">';
  html += '<div style="display:flex;align-items:center;gap:9px;">';
  html += '<div style="background:linear-gradient(135deg,#6366f1,#8b5cf6);border-radius:9px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:16px;box-shadow:0 0 18px rgba(139,92,246,0.4);">🚗</div>';
  html += '<div><div style="font-weight:800;font-size:14px;background:linear-gradient(135deg,#e2e8f0,#94a3b8);-webkit-background-clip:text;-webkit-text-fill-color:transparent;">AutoKanban</div>';
  html += '<div style="font-size:8px;color:#334155;letter-spacing:2px;">CONCESSIONÁRIA</div></div></div>';

  Object.keys(BOARDS).forEach(function(id) {
    var b = BOARDS[id];
    var active = S.board===id;
    html += '<button class="tab-btn' + (active?' active':'') + '" data-board="' + id + '">' + b.icon + ' ' + b.label + '</button>';
  });

  html += '<div style="flex:1"></div>';
  html += '<div style="display:flex;gap:12px;align-items:center;font-size:11px;color:#334155;">';
  html += '<span><span style="color:#94a3b8;font-weight:700;">' + total + '</span> veículos</span>';
  html += '<span><span style="color:#4ade80;font-weight:700;">' + done + '</span> prontos</span>';
  html += '<span style="font-size:9px;color:' + syncColor + ';letter-spacing:1px;">' + syncLabel + '</span>';
  if(S.lastSync) html += '<span style="font-size:9px;color:#1e293b;">' + S.lastSync.toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit",second:"2-digit"}) + '</span>';
  html += '</div>';
  html += '<button id="btn-novo" class="btn" style="background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;font-size:12px;box-shadow:0 4px 14px rgba(139,92,246,0.3);white-space:nowrap;">+ Novo Veículo</button>';
  html += '</div></div>';

  // CONTENT
  html += '<div style="padding:18px 20px 32px;max-width:1700px;margin:0 auto;">';

  // CONSULTA IA
  html += '<div style="background:rgba(16,185,129,0.06);border:1px solid rgba(16,185,129,0.2);border-radius:14px;padding:16px 20px;margin-bottom:20px;">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">';
  html += '<div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#059669,#10b981);display:flex;align-items:center;justify-content:center;font-size:15px;">🔍</div>';
  html += '<div><div style="color:#6ee7b7;font-size:12px;font-weight:700;">Consulta Inteligente</div>';
  html += '<div style="color:#475569;font-size:10px;letter-spacing:1px;">PERGUNTE QUALQUER COISA SOBRE OS VEÍCULOS</div></div></div>';
  html += '<div style="display:flex;gap:8px;margin-bottom:10px;">';
  html += '<input id="query-input" class="input" style="flex:1;border:1px solid rgba(16,185,129,0.25);" placeholder="Ex: Quais carros faltam higienizar? ou Resumo geral"/>';
  html += '<button id="btn-query" class="btn" style="background:' + (S.queryLoading?"rgba(16,185,129,0.2)":"linear-gradient(135deg,#059669,#10b981)") + ';color:#fff;font-weight:700;white-space:nowrap;min-width:110px;">' + (S.queryLoading?"⟳ IA...":"🔍 Consultar") + '</button>';
  html += '</div>';
  html += '<div style="display:flex;flex-wrap:wrap;gap:5px;margin-bottom:' + (S.queryResult?'12':'0') + 'px;">';
  var qs = ["Quais carros estão na recepção","Quais carros faltam higienizar","Carros do pós-venda","Carros com prioridade urgente","Resumo geral de tudo","Carros aguardando peça","Carros na pintura"];
  qs.forEach(function(q){ html += '<button class="sugestao" data-query="' + q + '">' + q + '</button>'; });
  html += '</div>';
  if(S.queryResult) html += '<div style="margin-top:12px;padding:14px 16px;background:rgba(0,0,0,0.25);border:1px solid rgba(16,185,129,0.15);border-radius:10px;font-size:13px;color:#cbd5e1;line-height:1.7;white-space:pre-wrap;max-height:340px;overflow-y:auto;">' + S.queryResult + '</div>';
  html += '</div>';

  // COMANDO IA
  html += '<div style="background:rgba(99,102,241,0.07);border:1px solid rgba(99,102,241,0.2);border-radius:14px;padding:16px 20px;margin-bottom:20px;">';
  html += '<div style="display:flex;align-items:center;gap:8px;margin-bottom:10px;">';
  html += '<div style="width:28px;height:28px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#8b5cf6);display:flex;align-items:center;justify-content:center;font-size:14px;">✦</div>';
  html += '<div><div style="color:#c4b5fd;font-size:12px;font-weight:700;">Comando em Texto Livre</div>';
  html += '<div style="color:#475569;font-size:10px;letter-spacing:1px;">DESCREVA O QUE QUER FAZER — A IA INTERPRETA</div></div></div>';
  html += '<div style="display:flex;gap:8px;">';
  html += '<input id="cmd-input" class="input" style="flex:1;border:1px solid rgba(99,102,241,0.3);" placeholder="Ex: Entra o Civic placa MNO-3344 na recepção, urgente"/>';
  html += '<button id="btn-cmd" class="btn" style="background:' + (S.cmdLoading?"rgba(99,102,241,0.3)":"linear-gradient(135deg,#6366f1,#8b5cf6)") + ';color:#fff;font-weight:700;white-space:nowrap;min-width:90px;">' + (S.cmdLoading?"⟳ IA...":"↵ Enviar") + '</button>';
  html += '</div>';
  if(S.cmdResult) html += '<div style="margin-top:9px;padding:7px 12px;border-radius:8px;background:' + (S.cmdResult.ok?"rgba(74,222,128,0.08)":"rgba(248,113,113,0.08)") + ';border:1px solid ' + (S.cmdResult.ok?"rgba(74,222,128,0.2)":"rgba(248,113,113,0.2)") + ';font-size:12px;color:' + (S.cmdResult.ok?"#4ade80":"#f87171") + ';">' + (S.cmdResult.ok?"✓ ":"⚠ ") + S.cmdResult.msg + '</div>';
  html += '<div style="margin-top:10px;display:flex;flex-wrap:wrap;gap:5px;">';
  var exs = ["Entrada o Civic 2022 placa MNO-3344 na recepção","Move o ABC-1234 para revisão","O XYZ-5678 está pronto","Atualiza obs do ABC-1234: cliente pediu urgência"];
  exs.forEach(function(e){ html += '<button class="example" data-cmd="' + e + '">' + (e.length>42?e.slice(0,42)+'…':e) + '</button>'; });
  html += '</div></div>';

  // LOG
  if(S.aiLog.length > 0) {
    html += '<div style="margin-bottom:16px;padding:10px 16px;background:rgba(255,255,255,0.02);border:1px solid rgba(255,255,255,0.06);border-radius:10px;">';
    html += '<div style="font-size:9px;color:#334155;letter-spacing:2px;margin-bottom:7px;">HISTÓRICO IA</div>';
    S.aiLog.forEach(function(l){ html += '<div style="font-size:11px;color:#475569;display:flex;gap:8px;margin-bottom:2px;"><span style="color:#334155;font-family:monospace;">' + l.time + '</span><span>' + l.msg + '</span></div>'; });
    html += '</div>';
  }

  // KANBAN
  html += '<div style="overflow-x:auto;"><div style="display:flex;gap:12px;min-width:max-content;">';
  board.cols.forEach(function(col, colIdx) {
    var cards = bdata[col.id] || [];
    html += '<div style="width:265px;flex-shrink:0;">';
    html += '<div class="col-header" style="border-top:3px solid ' + col.color + ';">';
    html += '<div style="display:flex;align-items:center;gap:7px;"><div style="width:7px;height:7px;border-radius:50%;background:' + col.color + ';box-shadow:0 0 7px ' + col.color + ';"></div>';
    html += '<span style="font-size:11px;font-weight:700;color:#cbd5e1;">' + col.label + '</span></div>';
    html += '<span style="background:' + col.color + '1a;color:' + col.color + ';border:1px solid ' + col.color + '35;border-radius:11px;font-size:10px;font-weight:700;padding:1px 7px;">' + cards.length + '</span></div>';
    html += '<div class="col-body">';
    if(cards.length === 0) {
      html += '<div class="empty">vazio</div>';
    } else {
      cards.forEach(function(card) {
        var prog = progress(card.checklist);
        var allItems = []; card.checklist.forEach(function(c){ c.items.forEach(function(i){ allItems.push(i); }); });
        var doneItems = allItems.filter(function(i){ return i.done; }).length;
        var progColor = prog===100?"#4ade80":prog>60?"#a78bfa":prog>30?"#fbbf24":"#38bdf8";
        html += '<div class="card" style="border-left:3px solid ' + col.color + ';" data-card-id="' + card.id + '" data-col-id="' + col.id + '">';
        html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:5px;">';
        html += '<div style="flex:1;min-width:0;margin-right:6px;"><div style="font-family:monospace;font-weight:800;font-size:14px;color:#f1f5f9;letter-spacing:1px;">' + card.placa + '</div>';
        html += '<div style="font-size:11px;color:#475569;margin-top:1px;">' + card.modelo + '</div></div>';
        if(card.oficina) html += '<span class="chip">📍 ' + card.oficina + '</span>';
        html += '</div>';
        if(card.consultor) html += '<div style="font-size:10px;color:#64748b;margin-bottom:4px;">👤 ' + card.consultor + '</div>';
        if(card.observacoes) html += '<div style="font-size:11px;color:#475569;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;margin-bottom:2px;">' + card.observacoes + '</div>';
        html += '<div style="margin-top:9px;"><div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-bottom:3px;font-family:monospace;"><span>PROGRESSO</span><span style="color:' + progColor + ';">' + prog + '%</span></div>';
        html += '<div style="height:4px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:' + prog + '%;background:' + progColor + ';border-radius:3px;transition:width 0.4s;"></div></div></div>';
        html += '<div style="display:flex;justify-content:space-between;align-items:center;margin-top:9px;">';
        html += '<span style="font-size:9px;color:#334155;font-family:monospace;">✓ ' + doneItems + '/' + allItems.length + '</span>';
        html += '<div style="display:flex;gap:3px;">';
        if(colIdx > 0) html += '<button class="move-btn" data-card-id="' + card.id + '" data-dir="-1">◀</button>';
        if(colIdx < board.cols.length-1) html += '<button class="move-btn" data-card-id="' + card.id + '" data-dir="1">▶</button>';
        html += '</div></div></div>';
      });
    }
    html += '</div></div>';
  });
  html += '</div></div></div>';

  // MODAL EDITAR
  if(S.editCard) {
    var card = S.editCard;
    var colId = S.editColId;
    var prog = progress(card.checklist);
    var progColor = prog===100?"#4ade80":prog>60?"#a78bfa":prog>30?"#fbbf24":"#38bdf8";
    html += '<div class="modal-bg" id="modal-edit-bg">';
    html += '<div class="modal" onclick="event.stopPropagation()">';
    html += '<div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:22px;">';
    html += '<div><div style="color:#475569;font-size:10px;letter-spacing:2px;margin-bottom:3px;">EDITAR CARD</div>';
    html += '<div style="color:#f1f5f9;font-size:17px;font-weight:800;font-family:monospace;">' + card.placa + '</div></div>';
    html += '<button id="btn-close-edit" class="btn" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#64748b;width:32px;height:32px;padding:0;">✕</button></div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">';
    html += '<div><label class="label">Placa</label><input class="input" id="e-placa" value="' + (card.placa||"") + '"/></div>';
    html += '<div><label class="label">Modelo</label><input class="input" id="e-modelo" value="' + (card.modelo||"") + '"/></div>';
    html += '<div><label class="label">Consultor</label><input class="input" id="e-consultor" value="' + (card.consultor||"") + '"/></div>';
    html += '<div><label class="label">Oficina / Local</label><input class="input" id="e-oficina" value="' + (card.oficina||"") + '" placeholder="Ex: Box 3, Funilaria"/></div>';
    html += '<div><label class="label">Prioridade</label><select class="input" id="e-prioridade">';
    [{id:"baixa",l:"Baixa"},{id:"media",l:"Média"},{id:"alta",l:"Alta"},{id:"urgente",l:"Urgente"}].forEach(function(p){
      html += '<option value="' + p.id + '"' + (card.prioridade===p.id?" selected":"") + '>' + p.l + '</option>';
    });
    html += '</select></div>';
    html += '<div><label class="label">Etapa</label><select class="input" id="e-coluna">';
    BOARDS[S.board].cols.forEach(function(c){
      html += '<option value="' + c.id + '"' + (colId===c.id?" selected":"") + '>' + c.label + '</option>';
    });
    html += '</select></div></div>';
    html += '<div style="margin-bottom:14px;"><label class="label">Observações</label>';
    html += '<textarea class="input" id="e-obs" style="height:68px;resize:vertical;">' + (card.observacoes||"") + '</textarea></div>';
    html += '<div><div style="display:flex;justify-content:space-between;font-size:9px;color:#475569;margin-bottom:3px;font-family:monospace;"><span>PROGRESSO</span><span style="color:' + progColor + ';">' + prog + '%</span></div>';
    html += '<div style="height:4px;border-radius:3px;background:rgba(255,255,255,0.06);overflow:hidden;"><div style="height:100%;width:' + prog + '%;background:' + progColor + ';border-radius:3px;"></div></div></div>';
    html += '<div style="margin-top:18px;"><div style="color:#475569;font-size:10px;letter-spacing:2px;margin-bottom:10px;">CHECKLIST</div>';
    card.checklist.forEach(function(cat, ci) {
      html += '<div style="margin-bottom:14px;"><div style="color:#94a3b8;font-size:11px;font-weight:700;letter-spacing:1px;text-transform:uppercase;margin-bottom:7px;">' + cat.cat + '</div>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:5px;">';
      cat.items.forEach(function(item, ii) {
        var bg = item.done?"rgba(74,222,128,0.08)":"rgba(255,255,255,0.03)";
        var bdr = item.done?"rgba(74,222,128,0.25)":"rgba(255,255,255,0.06)";
        var col2 = item.done?"#4ade80":"#64748b";
        var td = item.done?"line-through":"none";
        html += '<label class="check-label" style="background:' + bg + ';border:1px solid ' + bdr + ';">';
        html += '<input type="checkbox" ' + (item.done?"checked":"") + ' class="check-item" data-ci="' + ci + '" data-ii="' + ii + '" style="accent-color:#4ade80;width:13px;height:13px;"/>';
        html += '<span style="font-size:11px;color:' + col2 + ';text-decoration:' + td + ';">' + item.label + '</span></label>';
      });
      html += '</div></div>';
    });
    html += '</div>';
    html += '<div style="display:flex;gap:9px;margin-top:22px;padding-top:18px;border-top:1px solid rgba(255,255,255,0.07);">';
    html += '<button id="btn-delete" class="btn" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.25);color:#f87171;">🗑 Excluir</button>';
    html += '<button id="btn-save" class="btn" style="flex:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;">✓ Salvar</button>';
    html += '</div></div></div>';
  }

  // MODAL NOVO
  if(S.showNew) {
    html += '<div class="modal-bg" id="modal-new-bg">';
    html += '<div class="modal" onclick="event.stopPropagation()">';
    html += '<div style="color:#475569;font-size:10px;letter-spacing:2px;margin-bottom:3px;">NOVO VEÍCULO</div>';
    html += '<div style="color:#f1f5f9;font-size:17px;font-weight:800;margin-bottom:20px;">Adicionar ao Kanban</div>';
    html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:12px;">';
    html += '<div><label class="label">Placa *</label><input class="input" id="n-placa" placeholder="ABC-1234"/></div>';
    html += '<div><label class="label">Modelo *</label><input class="input" id="n-modelo" placeholder="Toyota Corolla"/></div>';
    html += '<div><label class="label">Consultor</label><input class="input" id="n-consultor" placeholder="Nome"/></div>';
    html += '<div><label class="label">Oficina / Local</label><input class="input" id="n-oficina" placeholder="Ex: Box 3"/></div>';
    html += '<div><label class="label">Prioridade</label><select class="input" id="n-prioridade">';
    [{id:"baixa",l:"Baixa"},{id:"media",l:"Média"},{id:"alta",l:"Alta"},{id:"urgente",l:"Urgente"}].forEach(function(p){
      html += '<option value="' + p.id + '"' + (p.id==="media"?" selected":"") + '>' + p.l + '</option>';
    });
    html += '</select></div>';
    html += '<div style="grid-column:1/-1"><label class="label">Etapa inicial</label><select class="input" id="n-coluna">';
    BOARDS[S.board].cols.forEach(function(c){ html += '<option value="' + c.id + '">' + c.label + '</option>'; });
    html += '</select></div></div>';
    html += '<div style="margin-bottom:20px;"><label class="label">Observações</label><textarea class="input" id="n-obs" style="height:60px;resize:vertical;" placeholder="Notas iniciais..."></textarea></div>';
    html += '<div style="display:flex;gap:9px;">';
    html += '<button id="btn-cancel-new" class="btn" style="background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);color:#64748b;">Cancelar</button>';
    html += '<button id="btn-add" class="btn" style="flex:1;background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;font-weight:700;">+ Adicionar</button>';
    html += '</div></div></div>';
  }

  return html;
}

function attachEvents() {
  if(!S.data) return;

  // TABS
  document.querySelectorAll("[data-board]").forEach(function(el){
    el.addEventListener("click", function(){ setState({board:el.dataset.board, editCard:null, showNew:false}); });
  });

  // NOVO
  var btnNovo = document.getElementById("btn-novo");
  if(btnNovo) btnNovo.addEventListener("click", function(){ setState({showNew:true}); });

  var btnCancelNew = document.getElementById("btn-cancel-new");
  if(btnCancelNew) btnCancelNew.addEventListener("click", function(){ setState({showNew:false}); });

  var modalNewBg = document.getElementById("modal-new-bg");
  if(modalNewBg) modalNewBg.addEventListener("click", function(e){ if(e.target===modalNewBg) setState({showNew:false}); });

  var btnAdd = document.getElementById("btn-add");
  if(btnAdd) btnAdd.addEventListener("click", function(){
    var placa = (document.getElementById("n-placa").value||"").toUpperCase().trim();
    var modelo = (document.getElementById("n-modelo").value||"").trim();
    if(!placa||!modelo) return;
    var coluna = document.getElementById("n-coluna").value;
    var card = {
      id:uid(), placa:placa, modelo:modelo,
      prioridade:document.getElementById("n-prioridade").value,
      consultor:document.getElementById("n-consultor").value||"",
      oficina:document.getElementById("n-oficina").value||"",
      observacoes:document.getElementById("n-obs").value||"",
      checklist:newChecklist(S.board),
      criadoEm:new Date().toISOString()
    };
    update(function(d){ if(!d[S.board][coluna]) d[S.board][coluna]=[]; d[S.board][coluna].unshift(card); });
    setState({showNew:false});
  });

  // CARDS
  document.querySelectorAll(".card").forEach(function(el){
    el.addEventListener("click", function(){
      var id = el.dataset.cardId;
      var colId = el.dataset.colId;
      var board = S.data[S.board];
      var card = null;
      Object.values(board).forEach(function(col){ var c = col.find(function(c){ return c.id===id; }); if(c) card=c; });
      if(card) setState({editCard:JSON.parse(JSON.stringify(card)), editColId:colId});
    });
  });

  // MOVE BUTTONS
  document.querySelectorAll(".move-btn").forEach(function(el){
    el.addEventListener("click", function(e){
      e.stopPropagation();
      var id = el.dataset.cardId;
      var dir = parseInt(el.dataset.dir);
      var cols = BOARDS[S.board].cols;
      var colIdx = -1; var cardColId = null; var card = null;
      cols.forEach(function(col, i){
        var c = (S.data[S.board][col.id]||[]).find(function(c){ return c.id===id; });
        if(c){ colIdx=i; cardColId=col.id; card=c; }
      });
      var target = cols[colIdx+dir];
      if(!target||!card) return;
      update(function(d){
        d[S.board][cardColId] = d[S.board][cardColId].filter(function(c){ return c.id!==id; });
        d[S.board][target.id].unshift(card);
      });
    });
  });

  // EDIT MODAL
  var btnCloseEdit = document.getElementById("btn-close-edit");
  if(btnCloseEdit) btnCloseEdit.addEventListener("click", function(){ setState({editCard:null}); });

  var modalEditBg = document.getElementById("modal-edit-bg");
  if(modalEditBg) modalEditBg.addEventListener("click", function(e){ if(e.target===modalEditBg) setState({editCard:null}); });

  // CHECK ITEMS
  document.querySelectorAll(".check-item").forEach(function(el){
    el.addEventListener("change", function(){
      var ci = parseInt(el.dataset.ci);
      var ii = parseInt(el.dataset.ii);
      var card = JSON.parse(JSON.stringify(S.editCard));
      card.checklist[ci].items[ii].done = !card.checklist[ci].items[ii].done;
      setState({editCard:card});
    });
  });

  var btnSave = document.getElementById("btn-save");
  if(btnSave) btnSave.addEventListener("click", function(){
    var card = JSON.parse(JSON.stringify(S.editCard));
    card.placa = (document.getElementById("e-placa").value||"").toUpperCase();
    card.modelo = document.getElementById("e-modelo").value||"";
    card.consultor = document.getElementById("e-consultor").value||"";
    card.oficina = document.getElementById("e-oficina").value||"";
    card.prioridade = document.getElementById("e-prioridade").value;
    card.observacoes = document.getElementById("e-obs").value||"";
    var newColId = document.getElementById("e-coluna").value;
    var oldColId = S.editColId;
    update(function(d){
      d[S.board][oldColId] = d[S.board][oldColId].filter(function(c){ return c.id!==card.id; });
      if(!d[S.board][newColId]) d[S.board][newColId]=[];
      d[S.board][newColId].push(card);
    });
    setState({editCard:null});
  });

  var btnDelete = document.getElementById("btn-delete");
  if(btnDelete) btnDelete.addEventListener("click", function(){
    var id = S.editCard.id;
    update(function(d){ Object.keys(d[S.board]).forEach(function(col){ d[S.board][col]=d[S.board][col].filter(function(c){ return c.id!==id; }); }); });
    setState({editCard:null});
  });

  // QUERY IA
  var queryInput = document.getElementById("query-input");
  var btnQuery = document.getElementById("btn-query");
  if(queryInput) queryInput.addEventListener("keydown", function(e){ if(e.key==="Enter") runQuery(queryInput.value); });
  if(btnQuery) btnQuery.addEventListener("click", function(){ if(queryInput) runQuery(queryInput.value); });

  document.querySelectorAll(".sugestao").forEach(function(el){
    el.addEventListener("click", function(){ runQuery(el.dataset.query); });
  });

  // CMD IA
  var cmdInput = document.getElementById("cmd-input");
  var btnCmd = document.getElementById("btn-cmd");
  if(cmdInput) cmdInput.addEventListener("keydown", function(e){ if(e.key==="Enter") runCmd(cmdInput.value); });
  if(btnCmd) btnCmd.addEventListener("click", function(){ if(cmdInput) runCmd(cmdInput.value); });

  document.querySelectorAll(".example").forEach(function(el){
    el.addEventListener("click", function(){ var inp = document.getElementById("cmd-input"); if(inp){ inp.value=el.dataset.cmd; inp.focus(); } });
  });
}

async function runQuery(text) {
  if(!text||!text.trim()||S.queryLoading) return;
  setState({queryLoading:true, queryResult:null});
  try {
    var r = await consultaIA(text.trim());
    setState({queryLoading:false, queryResult:r});
  } catch(e) {
    setState({queryLoading:false, queryResult:"Erro: " + e.message});
  }
}

async function runCmd(text) {
  if(!text||!text.trim()||S.cmdLoading) return;
  setState({cmdLoading:true, cmdResult:null});
  try {
    var r = await interpretCmd(text.trim());
    if(r.acoes && r.acoes.length > 0) {
      applyActions(r.acoes);
      var log = [{time:new Date().toLocaleTimeString("pt-BR",{hour:"2-digit",minute:"2-digit"}), msg:r.resumo}].concat(S.aiLog.slice(0,9));
      setState({cmdLoading:false, cmdResult:{ok:true,msg:r.resumo}, aiLog:log});
    } else {
      setState({cmdLoading:false, cmdResult:{ok:false,msg:r.resumo||"Não entendi o comando."}});
    }
  } catch(e) {
    setState({cmdLoading:false, cmdResult:{ok:false,msg:"Erro: " + e.message}});
  }
}

render();
</script>
</body>
</html>
